services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sape
      POSTGRES_USER: sape
      POSTGRES_PASSWORD: sape
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  web:
    build: .
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=SAPE.settings.prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
    command: gunicorn SAPE.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 300
    volumes:
      - ./static:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      - db
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  celery_worker:
    build: .
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=SAPE.settings.prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
    command: celery -A SAPE worker -l info --concurrency=4
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: always

  celery_beat:
    build: .
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=SAPE.settings.prod
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
    command: celery -A SAPE beat -l info
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  media_volume:
  pgdata:
